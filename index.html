<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Sunpark</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: 'Playfair Display', serif;
      background: url('bg.jpg') no-repeat center center;
      background-size: cover;
      background-position: center 30%;
    }

    .overlay {
      background: rgba(0,0,0,0.55);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    .title {
      color: white;
      font-size: 42px;
      font-weight: 700;
      margin: 0 0 10px 0;
      letter-spacing: 1px;
    }

    .subtitle {
      color: white;
      font-size: 14px;
      font-weight: 400;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    a.button {
      display: block;
      margin: 10px 0;
      padding: 14px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
    }

    a.button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="container">

      <h1 class="title">Sunpark Grill Bar</h1>
      <p class="subtitle">Банкетное меню</p>

      <a class="button" href="menu.pdf" target="_blank">Открыть меню</a>
      <a class="button" href="menu.pdf" download>Скачать PDF</a>

    </div>
  </div>
</body>
</html>

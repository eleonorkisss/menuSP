<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Sunpark</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
  font-family: 'Playfair Display', serif;
  background: url('bg.jpg') no-repeat center center;
  background-size: cover;
  background-position: center 30%;
}

    .overlay {
      background: rgba(0,0,0,0.5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .title {
  color: white;
  font-size: 42px;
  font-weight: 700;
  margin: 0 0 10px 0;
  letter-spacing: 1px;
}
    .subtitle {
  color: white;
  font-size: 14px;
  font-weight: 400;
  opacity: 0.85;
  margin-bottom: 25px;
}
    .container {
      text-align: center;
      max-width: 320px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
      font-size: 14px;
    }

    a.button {
  display: block;
  margin: 10px 0;
  padding: 14px;
  background: white;
  color: black;
  text-decoration: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 500;
}
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="container">
      <h1>Sunpark Grill Bar</h1>
      <p>Банкетное меню</p>

      <a class="button" href="menu.pdf" target="_blank">Открыть меню</a>
      <a class="button" href="menu.pdf" download>Скачать PDF</a>
    </div>
  </div>
</body>
</html>

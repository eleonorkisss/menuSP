<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>San Park</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: url('bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .overlay {
      background: rgba(0,0,0,0.5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 320px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
      font-size: 14px;
    }

    a.button {
      display: block;
      margin: 10px 0;
      padding: 14px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="container">
      <h1>San Park</h1>
      <p>Menu</p>

      <a class="button" href="menu.pdf" target="_blank">Открыть меню</a>
      <a class="button" href="menu.pdf" download>Скачать PDF</a>
    </div>
  </div>
</body>
</html>
